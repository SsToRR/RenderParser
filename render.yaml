services:
  - type: web
    name: kia-models-parser
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: REFRESH_INTERVAL_SECONDS
        value: "3600"
      - key: SCRAPE_TIMEOUT_SECONDS
        value: "30"
      - key: KIA_MODELS_OUTPUT
        value: "/tmp/kia_models.json"
      - key: KIA_MODELS_SOURCE_OUTPUT
        value: "/tmp/kia_models_source.json"
      - key: KIA_MODEL_OVERRIDES_PATH
        value: "/tmp/kia_model_overrides.json"
      - key: KIA_PENDING_CHANGES_PATH
        value: "/tmp/kia_pending_changes.json"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: KIA_LOGS_CHAT_ID
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
